---
- name: Read k3s join token from control-plane
  hosts: control_plane
  tasks:
    - name: Read k3s node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_node_token_slurp
      no_log: true

    - name: Store token for worker play
      set_fact:
        k3s_node_token: "{{ k3s_node_token_slurp.content | b64decode | trim }}"

- name: Install k3s agent on Hetzner worker (Tailscale-joined)
  hosts: hetzner_workers
  vars:
    k3s_version: "v1.34.6+k3s1"
    control_plane_tailscale_ip: "{{ hostvars[groups['control_plane'][0]].tailscale_ip }}"
    k3s_node_token: "{{ hostvars[groups['control_plane'][0]].k3s_node_token }}"

  handlers:
    - name: Restart k3s agent
      systemd:
        name: k3s-agent
        state: restarted

  tasks:
    - name: Create k3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0700"

    - name: Install Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: Enable and start tailscaled
      systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Authenticate Tailscale
      command: tailscale up --auth-key={{ tailscale_auth_key }} --accept-routes
      when: tailscale_auth_key is defined
      changed_when: true

    - name: Get Tailscale IP
      command: tailscale ip -4
      register: worker_tailscale_ip
      changed_when: false

    - name: Write k3s agent config
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: "0600"
        content: |
          server: https://{{ control_plane_tailscale_ip }}:6443
          token: {{ k3s_node_token }}
          node-name: {{ inventory_hostname }}
          node-label:
            - worker-type=cpu
          flannel-iface: tailscale0
          node-ip: {{ worker_tailscale_ip.stdout }}
      no_log: true
      notify: Restart k3s agent

    - name: Install k3s agent binary
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          INSTALL_K3S_EXEC="agent" \
          sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Flush handlers (apply config before starting)
      meta: flush_handlers

    - name: Ensure k3s-agent is enabled and running
      systemd:
        name: k3s-agent
        enabled: true
        state: started

- name: Verify Hetzner worker registration
  hosts: control_plane

  tasks:
    - name: Wait for worker to be Ready
      command: kubectl get node {{ item }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: worker_ready
      changed_when: false
      until: worker_ready.stdout == "True"
      retries: 30
      delay: 10
      loop: "{{ groups['hetzner_workers'] }}"
