---
- name: Read k3s join token from control-plane
  hosts: control_plane
  tasks:
    - name: Read k3s node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_node_token_slurp
      no_log: true

    - name: Store token for worker play
      set_fact:
        k3s_node_token: "{{ k3s_node_token_slurp.content | b64decode | trim }}"

- name: Install k3s agent on Hetzner worker
  hosts: hetzner_workers
  vars:
    k3s_version: "v1.34.6+k3s1"
    control_plane_ip: "{{ hostvars[groups['control_plane'][0]].public_ip }}"
    k3s_node_token: "{{ hostvars[groups['control_plane'][0]].k3s_node_token }}"
  tasks:
    - name: Create k3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0700"

    - name: Write k3s agent config
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: "0600"
        content: |
          server: https://{{ control_plane_ip }}:6443
          token: {{ k3s_node_token }}
          node-name: {{ inventory_hostname }}
          node-label:
            - worker-type=cpu

    - name: Install k3s agent
      shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          INSTALL_K3S_EXEC="agent" \
          sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s-agent service is enabled and started
      systemd:
        name: k3s-agent
        enabled: true
        state: started
