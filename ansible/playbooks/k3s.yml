---
- name: Install k3s — control-plane node + worker node on same machine
  hosts: control_plane
  become: true

  tasks:
    - name: Install dependencies
      apt:
        name:
          - curl
          - ca-certificates
        state: present
        update_cache: true

    # ── Control-plane node ────────────────────────────────────────────────────

    - name: Check if k3s server already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install k3s server (control-plane + worker on single node)
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server \
          --disable=traefik \
          --disable=servicelb \
          --tls-san={{ ansible_host }}" sh -
      when: not k3s_binary.stat.exists

    - name: Wait for node Ready
      command: kubectl get nodes
      register: nodes_output
      until: "'Ready' in nodes_output.stdout"
      retries: 30
      delay: 10

    - name: Remove control-plane taint (single-node — node is also worker)
      command: >
        kubectl taint node --all node-role.kubernetes.io/control-plane:NoSchedule-
      ignore_errors: true

    # ── Traefik ingress ───────────────────────────────────────────────────────
    # k3s bundled Traefik and ServiceLB are disabled above. Install Traefik
    # explicitly with hostPorts so the single Hetzner node serves HTTP/HTTPS
    # directly on ports 80/443.

    - name: Check if Helm is installed
      command: helm version --short
      register: helm_version
      changed_when: false
      failed_when: false

    - name: Install Helm
      shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_version.rc != 0

    - name: Add Traefik Helm repository
      command: helm repo add traefik https://traefik.github.io/charts
      register: traefik_repo
      changed_when: "'has been added' in traefik_repo.stdout"
      failed_when:
        - traefik_repo.rc != 0
        - "'already exists' not in traefik_repo.stderr"

    - name: Add Jetstack Helm repository
      command: helm repo add jetstack https://charts.jetstack.io
      register: jetstack_repo
      changed_when: "'has been added' in jetstack_repo.stdout"
      failed_when:
        - jetstack_repo.rc != 0
        - "'already exists' not in jetstack_repo.stderr"

    - name: Update Helm repositories
      command: helm repo update

    - name: Create traefik namespace
      command: kubectl create namespace traefik --dry-run=client -o yaml
      register: traefik_namespace
      changed_when: false

    - name: Apply traefik namespace
      shell: kubectl apply -f -
      args:
        stdin: "{{ traefik_namespace.stdout }}"

    - name: Copy Traefik Helm values
      copy:
        src: ../helm-values/traefik.yaml
        dest: /tmp/traefik-values.yaml
        mode: "0644"

    - name: Install or upgrade Traefik ingress controller
      command: >
        helm upgrade --install traefik traefik/traefik
        --namespace traefik
        --values /tmp/traefik-values.yaml
        --wait
        --timeout 300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── cert-manager ─────────────────────────────────────────────────────────
    # cert-manager issues Let's Encrypt certificates for Traefik Ingresses.

    - name: Create cert-manager namespace
      command: kubectl create namespace cert-manager --dry-run=client -o yaml
      register: cert_manager_namespace
      changed_when: false

    - name: Apply cert-manager namespace
      shell: kubectl apply -f -
      args:
        stdin: "{{ cert_manager_namespace.stdout }}"

    - name: Copy cert-manager Helm values
      copy:
        src: ../helm-values/cert-manager.yaml
        dest: /tmp/cert-manager-values.yaml
        mode: "0644"

    - name: Install or upgrade cert-manager
      command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager
        --values /tmp/cert-manager-values.yaml
        --wait
        --timeout 300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Copy Let's Encrypt ClusterIssuer manifest
      copy:
        src: ../manifests/clusterissuer-letsencrypt-prod.yaml
        dest: /tmp/clusterissuer-letsencrypt-prod.yaml
        mode: "0644"

    - name: Apply Let's Encrypt ClusterIssuer
      command: kubectl apply -f /tmp/clusterissuer-letsencrypt-prod.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # ── Kubeconfig ────────────────────────────────────────────────────────────

    - name: Show node
      command: kubectl get nodes -o wide
      register: nodes_wide

    - name: Print node
      debug:
        msg: "{{ nodes_wide.stdout_lines }}"

    - name: Fetch kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /tmp/kubeconfig.yaml
        flat: true

    - name: Replace 127.0.0.1 with public IP in kubeconfig
      delegate_to: localhost
      become: false
      replace:
        path: /tmp/kubeconfig.yaml
        regexp: 'localhost|127\.0\.0\.1'
        replace: "{{ ansible_host }}"
