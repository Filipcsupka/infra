---
- name: Deploy Uptime Kuma monitoring (Docker, outside k3s)
  hosts: control_plane
  become: true

  vars:
    uptime_kuma_dir: /opt/monitoring

  tasks:
    # ── Docker ────────────────────────────────────────────────────────────────

    - name: Install Docker dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine + Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    # ── Uptime Kuma ───────────────────────────────────────────────────────────

    - name: Create monitoring directory
      file:
        path: "{{ uptime_kuma_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: ../../monitoring/docker-compose.yml
        dest: "{{ uptime_kuma_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start Uptime Kuma
      command: docker compose up -d
      args:
        chdir: "{{ uptime_kuma_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

    - name: Wait for Uptime Kuma to be ready
      uri:
        url: "{{ uptime_kuma_url }}/api/status"
        status_code: 200
      register: kuma_health
      until: kuma_health.status == 200
      retries: 30
      delay: 5

    - name: Print access info
      debug:
        msg: "Uptime Kuma running at http://{{ ansible_host }}:3001 — see monitoring/README.md for first-time setup"
