---
- name: Deploy Uptime Kuma monitoring (Docker, outside k3s)
  hosts: control_plane
  become: true

  vars:
    uptime_kuma_dir: /opt/monitoring
    uptime_kuma_url: "http://localhost:3001"
    uptime_kuma_user: "{{ lookup('env', 'UPTIME_KUMA_USERNAME') | default('admin') }}"
    uptime_kuma_pass: "{{ lookup('env', 'UPTIME_KUMA_PASSWORD') }}"

    monitors:
      # ── Public sites ──────────────────────────────────────────────────────
      - name: "vevsdesign.sk"
        type: http
        url: "https://vevsdesign.sk"
      - name: "www.vevsdesign.sk"
        type: http
        url: "https://www.vevsdesign.sk"
      - name: "filipcsupka.online"
        type: http
        url: "https://filipcsupka.online"
      - name: "www.filipcsupka.online"
        type: http
        url: "https://www.filipcsupka.online"
      # ── k8s / infra ───────────────────────────────────────────────────────
      - name: "k3s API"
        type: http
        url: "https://host.docker.internal:6443/healthz"
        extra:
          ignoreTls: true
          keyword: "ok"
      - name: "ArgoCD"
        type: http
        url: "http://host.docker.internal:30080"
      - name: "Traefik"
        type: http
        url: "http://host.docker.internal:80"

  tasks:
    # ── Docker ────────────────────────────────────────────────────────────────

    - name: Install Docker dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine + Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    # ── Uptime Kuma ───────────────────────────────────────────────────────────

    - name: Create monitoring directory
      file:
        path: "{{ uptime_kuma_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: ../../monitoring/docker-compose.yml
        dest: "{{ uptime_kuma_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start Uptime Kuma
      command: docker compose up -d
      args:
        chdir: "{{ uptime_kuma_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

    - name: Wait for Uptime Kuma to be ready
      uri:
        url: "{{ uptime_kuma_url }}/api/status"
        status_code: 200
      register: kuma_health
      until: kuma_health.status == 200
      retries: 30
      delay: 5

    # ── Initial admin setup ───────────────────────────────────────────────────

    # ── Monitor setup via uptime-kuma-api (Socket.IO, v2 compatible) ──────────

    - name: Install pip3
      apt:
        name: python3-pip
        state: present
        update_cache: false

    - name: Install uptime-kuma-api Python package
      pip:
        name: uptime-kuma-api
        state: present
        executable: pip3
        extra_args: --break-system-packages

    - name: Write monitor setup script
      copy:
        dest: /tmp/kuma_setup.py
        mode: "0700"
        content: |
          import os, sys
          from uptime_kuma_api import UptimeKumaApi, MonitorType

          url  = os.environ["KUMA_URL"]
          user = os.environ["KUMA_USER"]
          pwd  = os.environ["KUMA_PASS"]

          monitors = [
          {% for m in monitors %}
              {"name": "{{ m.name }}", "url": "{{ m.url }}", "type": "{{ m.type | default('http') }}", "ignoreTls": {{ m.extra.ignoreTls | default(false) | ternary('True', 'False') }}},
          {% endfor %}
          ]

          api = UptimeKumaApi(url)
          try:
              try:
                  api.setup(user, pwd)
              except Exception:
                  pass  # already set up
              api.login(user, pwd)
              existing = {m["name"] for m in api.get_monitors()}
              for m in monitors:
                  if m["name"] not in existing:
                      api.add_monitor(
                          type=MonitorType.HTTP,
                          name=m["name"],
                          url=m["url"],
                          interval=60,
                          maxretries=3,
                          ignoreTls=m["ignoreTls"],
                      )
                      print(f"created: {m['name']}")
                  else:
                      print(f"exists:  {m['name']}")
          finally:
              api.disconnect()

    - name: Run monitor setup
      command: python3 /tmp/kuma_setup.py
      environment:
        KUMA_URL: "{{ uptime_kuma_url }}"
        KUMA_USER: "{{ uptime_kuma_user }}"
        KUMA_PASS: "{{ uptime_kuma_pass }}"
      register: kuma_setup_result

    - name: Print monitor setup output
      debug:
        msg: "{{ kuma_setup_result.stdout_lines }}"

    - name: Remove setup script
      file:
        path: /tmp/kuma_setup.py
        state: absent
