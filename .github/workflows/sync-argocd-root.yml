name: Sync Argo Root

on:
  push:
    branches: [main]
    paths:
      - 'argocd/apps/**'
      - 'argocd/projects/**'
      - 'argocd/root/**'
      - 'argocd/root-application.yaml'
      - '.github/workflows/sync-argocd-root.yml'
  workflow_dispatch:

jobs:
  sync-root:
    name: Refresh infra-root
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure infra-root exists
        run: kubectl apply -f argocd/root-application.yaml

      - name: Force infra-root refresh
        run: |
          kubectl -n argocd annotate application infra-root \
            argocd.argoproj.io/refresh=hard --overwrite

      - name: Show infra-root status
        run: |
          kubectl -n argocd get application infra-root -o wide
          kubectl -n argocd get applications
