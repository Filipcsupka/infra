name: ArgoCD

on:
  push:
    branches: [main]
    paths:
      - 'argocd/**'
      - '.github/workflows/bootstrap-argocd.yml'
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
  TF_VAR_server_type: cx23
  TF_VAR_location: nbg1
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  sync:
    name: Apply ArgoCD state
    runs-on: ubuntu-latest
    concurrency:
      group: argocd-sync
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect ArgoCD upgrade changes
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            echo "needs_upgrade=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | rg -q '^(argocd/values\.yaml|argocd/root-application\.yaml|\.github/workflows/bootstrap-argocd\.yml)$'; then
            echo "needs_upgrade=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_upgrade=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.changes.outputs.needs_upgrade == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Get server IP from remote state
        if: steps.changes.outputs.needs_upgrade == 'true'
        working-directory: terraform
        run: |
          terraform init -input=false
          echo "SERVER_IP=$(terraform output -raw control_plane_public_ip)" >> $GITHUB_ENV

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        if: steps.changes.outputs.needs_upgrade == 'true'
        uses: azure/setup-helm@v4

      - name: Add ArgoCD Helm repo
        if: steps.changes.outputs.needs_upgrade == 'true'
        run: helm repo add argo https://argoproj.github.io/argo-helm && helm repo update

      - name: Create argocd namespace
        run: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm install / upgrade ArgoCD
        if: steps.changes.outputs.needs_upgrade == 'true'
        run: |
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --values argocd/values.yaml \
            --set configs.cm.url=http://${SERVER_IP}:30080 \
            --wait --timeout 600s

      - name: Debug ArgoCD rollout failure
        if: ${{ failure() && steps.changes.outputs.needs_upgrade == 'true' }}
        run: |
          kubectl -n argocd get pods -o wide || true
          kubectl -n argocd get deploy,statefulset || true
          kubectl -n argocd describe pod argocd-application-controller-0 || true
          kubectl -n argocd logs statefulset/argocd-application-controller --tail=200 || true
          kubectl -n argocd logs deploy/argocd-repo-server --tail=200 || true

      - name: Apply Argo Root Application
        run: kubectl apply -f argocd/root-application.yaml

      - name: Force infra-root refresh
        run: |
          kubectl -n argocd annotate application infra-root \
            argocd.argoproj.io/refresh=hard --overwrite

      - name: Show Root Application
        run: |
          kubectl -n argocd get application infra-root -o wide
          kubectl -n argocd get applications
