name: Bootstrap ArgoCD

on:
  push:
    branches: [main]
    paths:
      - 'argocd/**'
      - '.github/workflows/bootstrap-argocd.yml'
  workflow_dispatch:

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
  TF_VAR_server_type: cx23
  TF_VAR_location: nbg1
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  bootstrap:
    name: Apply ArgoCD manifests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Get server IP from remote state
        working-directory: terraform
        run: |
          terraform init -input=false
          echo "SERVER_IP=$(terraform output -raw control_plane_public_ip)" >> $GITHUB_ENV

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add ArgoCD Helm repo
        run: helm repo add argo https://argoproj.github.io/argo-helm && helm repo update

      - name: Create argocd namespace
        run: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm install / upgrade ArgoCD
        run: |
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --values argocd/values.yaml \
            --set configs.cm.url=http://${SERVER_IP}:30080 \
            --wait --timeout 300s

      - name: Apply AppProject
        run: kubectl apply -f argocd/projects/default.yaml

      - name: Apply Applications
        run: kubectl apply -f argocd/apps/
