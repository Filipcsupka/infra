name: Update ai-chat image tag

# Triggered by repository_dispatch from the ai-chat repo CI.
# Updates the image tag in the prod overlay kustomization so ArgoCD re-deploys.

on:
  repository_dispatch:
    types: [update-ai-chat-image]

jobs:
  update-tag:
    name: Pin new image tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tag
        env:
          NEW_TAG: ${{ github.event.client_payload.tag }}
        run: |
          sed -i "s/newTag: .*/newTag: ${NEW_TAG}/" \
            gitops/apps/ai-chat/overlays/prod/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/ai-chat/overlays/prod/kustomization.yaml
          git commit -m "chore(ai-chat): bump image tag to ${{ github.event.client_payload.tag }}"
          git push
