name: Deploy Cluster

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - '.github/workflows/deploy-cluster.yml'
  workflow_dispatch:

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
  TF_VAR_server_type: cx23
  TF_VAR_location: nbg1

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.outputs.outputs.server_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get server IP
        id: outputs
        working-directory: terraform
        run: echo "server_ip=$(terraform output -raw control_plane_public_ip)" >> $GITHUB_OUTPUT

  k3s:
    name: Install k3s
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install --quiet ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/hetzner_ed25519
          chmod 600 /tmp/hetzner_ed25519

      - name: Generate inventory from terraform output
        run: |
          cat > ansible/inventory/hosts.ini <<EOF
          [control_plane]
          ${{ needs.terraform.outputs.server_ip }} ansible_user=root ansible_ssh_private_key_file=/tmp/hetzner_ed25519
          EOF

      - name: Run k3s playbook
        working-directory: ansible
        run: |
          ansible-playbook playbooks/k3s.yml

      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: /tmp/kubeconfig.yaml
          retention-days: 1
