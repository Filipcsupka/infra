name: Deploy Cluster

on:
  workflow_dispatch:

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
  TF_VAR_server_type: cx23
  TF_VAR_location: nbg1
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.outputs.outputs.server_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Get server IP
        id: outputs
        working-directory: terraform
        run: echo "server_ip=$(terraform output -raw control_plane_public_ip)" >> $GITHUB_OUTPUT

  k3s:
    name: Install k3s
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install --quiet ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/hetzner_ed25519
          chmod 600 /tmp/hetzner_ed25519

      - name: Generate inventory
        run: |
          cat > ansible/inventory/hosts.ini <<EOF
          [control_plane]
          ${{ needs.terraform.outputs.server_ip }} ansible_user=root ansible_ssh_private_key_file=/tmp/hetzner_ed25519
          EOF

      - name: Run k3s playbook
        working-directory: ansible
        run: ansible-playbook playbooks/k3s.yml

      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: /tmp/kubeconfig.yaml
          retention-days: 1

  argocd:
    name: Bootstrap ArgoCD
    runs-on: ubuntu-latest
    needs: [terraform, k3s]

    steps:
      - uses: actions/checkout@v4

      - name: Download kubeconfig
        uses: actions/download-artifact@v4
        with:
          name: kubeconfig
          path: /tmp

      - name: Set kubeconfig permissions
        run: chmod 600 /tmp/kubeconfig.yaml

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Create argocd namespace
        run: |
          kubectl --kubeconfig /tmp/kubeconfig.yaml \
            create namespace argocd --dry-run=client -o yaml | \
            kubectl --kubeconfig /tmp/kubeconfig.yaml apply -f -

      - name: Patch ArgoCD URL
        run: |
          sed -i "s|https://argocd.example.com|http://${{ needs.terraform.outputs.server_ip }}:30080|g" \
            argocd/install/patches/argocd-cm.yaml

      - name: Apply ArgoCD kustomization
        run: kubectl --kubeconfig /tmp/kubeconfig.yaml apply -k argocd/install/

      - name: Wait for ArgoCD server
        run: |
          kubectl --kubeconfig /tmp/kubeconfig.yaml \
            rollout status deployment/argocd-server -n argocd --timeout=300s

      - name: Apply AppProject
        run: kubectl --kubeconfig /tmp/kubeconfig.yaml apply -f argocd/projects/default.yaml

      - name: Apply Applications
        run: kubectl --kubeconfig /tmp/kubeconfig.yaml apply -f argocd/apps/
