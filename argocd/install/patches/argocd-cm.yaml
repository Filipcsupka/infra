apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # URL shown in notifications and the UI — change to your actual domain
  url: https://argocd.example.com

  # Allow ArgoCD to manage resources in all namespaces
  application.resourceTrackingMethod: annotation

  # Diff customisations — ignore common noisy fields
  resource.customizations.ignoreDifferences.apps_Deployment: |
    jqPathExpressions:
      - '.spec.template.spec.containers[].image'

  # Repositories this ArgoCD instance is allowed to pull from
  # For private repos, create a Secret (type: Opaque, label: argocd.argoproj.io/secret-type: repository)
  # and reference it here — never put credentials directly in this ConfigMap.

  # Health check overrides (examples — uncomment as needed)
  # resource.customizations.health.argoproj.io_Application: |
  #   hs = {}
  #   if obj.status ~= nil then
  #     if obj.status.health.status == "Healthy" then
  #       hs.status = "Healthy"
  #     end
  #   end
  #   return hs
