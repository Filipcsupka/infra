apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: All production applications
  sourceRepos:
    - https://github.com/Filipcsupka/infra
  destinations:
    - namespace: cv
      server: https://kubernetes.default.svc
    - namespace: vevsdesign
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
