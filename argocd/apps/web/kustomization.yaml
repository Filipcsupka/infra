apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# AI stack (ai-chat, k8s-ai-agent + its secret) runs on the GPU node k3sgpu,
# normally powered off — kept OUT of Argo to avoid reconcile storms. Apply the
# manifests manually when the GPU node is up.
resources:
  - chaos-generator.yaml
  - my-cv.yaml
  - vevsdesign.yaml
  - staging.yaml
  - memorial.yaml
  - memorial-secrets.yaml
