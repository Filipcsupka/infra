apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-chat
  namespace: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/Filipcsupka/infra
    targetRevision: HEAD
    path: gitops/apps/ai-chat/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-chat
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
