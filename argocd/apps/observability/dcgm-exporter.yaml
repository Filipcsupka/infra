apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dcgm-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: apps
  source:
    repoURL: https://nvidia.github.io/dcgm-exporter/helm-charts
    chart: dcgm-exporter
    targetRevision: "*"
    helm:
      releaseName: dcgm-exporter
      values: |
        # Pin to GPU node only
        nodeSelector:
          accelerator: nvidia
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule

        # ServiceAccount required for in-cluster config so pod labels attach to metrics
        serviceAccount:
          create: true
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9400"

        # ServiceMonitor so prometheus-stack scrapes GPU metrics
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: monitoring

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 700Mi


  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
