apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: apps
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: monitoring
      values: |
        fullnameOverride: monitoring

        crds:
          enabled: true
          upgradeJob:
            enabled: true
            # one-shot hook job — must NOT be pinned to the (often offline) GPU node,
            # otherwise the ArgoCD sync operation hangs on a Pending hook pod

        # ── Grafana ──────────────────────────────────────────────────────────
        grafana:
          enabled: true
          adminPassword: "prom-operator"  # TODO: SealedSecret

          nodeSelector:
            accelerator: nvidia
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - grafana.filipcsupka.online
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.filipcsupka.online

          grafana.ini:
            server:
              root_url: https://grafana.filipcsupka.online

          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              searchNamespace: ALL

          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false

          # Auto-provision dashboards from grafana.com
          dashboards:
            default:
              k8s-views-global:
                gnetId: 15757
                revision: 37
                datasource: Prometheus
              k8s-views-nodes:
                gnetId: 15759
                revision: 29
                datasource: Prometheus
              k8s-views-pods:
                gnetId: 15760
                revision: 28
                datasource: Prometheus
              node-exporter-full:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
              loki-logs:
                gnetId: 13639
                revision: 2
                datasource: Loki

          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 700Mi

        # ── Prometheus ───────────────────────────────────────────────────────
        prometheus:
          prometheusSpec:
            nodeSelector:
              accelerator: nvidia
            tolerations:
              - key: nvidia.com/gpu
                operator: Exists
                effect: NoSchedule

            retention: 1d
            retentionSize: "3GB"

            # Scrape ServiceMonitors/PodMonitors from all namespaces
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 700Mi

        # ── AlertManager ─────────────────────────────────────────────────────
        alertmanager:
          enabled: true

          alertmanagerSpec:
            nodeSelector:
              accelerator: nvidia
            tolerations:
              - key: nvidia.com/gpu
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: [namespace, alertname, pod]
              group_wait: 10s
              group_interval: 1m
              repeat_interval: 1h
              receiver: k8s-ai-agent
              routes:
                # Watchdog is a synthetic always-firing alert — ignore it
                - receiver: "null"
                  matchers:
                    - alertname = Watchdog
                # InfoInhibitor is noise — ignore
                - receiver: "null"
                  matchers:
                    - alertname = InfoInhibitor
                # k3s false positives — controller-manager/scheduler/proxy run inside
                # the k3s binary, Prometheus cannot scrape them via standard endpoints
                - receiver: "null"
                  matchers:
                    - alertname =~ "KubeControllerManagerDown|KubeSchedulerDown|KubeProxyDown"
                # Everything else goes to the AI agent
                - receiver: k8s-ai-agent
                  matchers:
                    - severity =~ "critical|warning"
                  continue: false
            receivers:
              - name: "null"
              - name: k8s-ai-agent
                webhook_configs:
                  - url: http://k8s-ai-agent.ai-agent.svc.cluster.local/alert
                    send_resolved: false
            inhibit_rules:
              # Suppress warnings when critical fires for same alert+namespace
              - source_matchers:
                  - severity = critical
                target_matchers:
                  - severity = warning
                equal: [alertname, namespace]

        # ── Prometheus Operator ───────────────────────────────────────────────
        prometheusOperator:
          nodeSelector:
            accelerator: nvidia
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          admissionWebhooks:
            deployment:
              nodeSelector:
                accelerator: nvidia
              tolerations:
                - key: nvidia.com/gpu
                  operator: Exists
                  effect: NoSchedule
            # patch jobs are one-shot hooks — keep them schedulable on always-on nodes
            patch: {}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # ── kube-state-metrics ────────────────────────────────────────────────
        kube-state-metrics:
          nodeSelector:
            accelerator: nvidia
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        # ── node-exporter (GPU node only) ─────────────────────────────────────
        prometheus-node-exporter:
          nodeSelector:
            accelerator: nvidia
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
