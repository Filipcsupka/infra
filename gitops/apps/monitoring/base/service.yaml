# ExternalName resolves to the k3s host via host.k3s.internal (auto-added by k3s).
# Traefik routes status.vevsdesign.sk → this service → Docker Uptime Kuma on :3001.
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: monitoring
spec:
  type: ExternalName
  externalName: host.k3s.internal
  ports:
    - port: 3001
      targetPort: 3001
