# ClusterIP + manual Endpoints — ExternalName can't use IPs and host.k3s.internal
# doesn't resolve in this cluster. Routes Traefik → Docker Uptime Kuma on host :3001.
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: uptime-kuma
  namespace: monitoring
subsets:
  - addresses:
      - ip: 178.104.235.97
    ports:
      - port: 3001
