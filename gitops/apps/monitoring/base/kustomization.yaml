apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - service.yaml
  - ingress.yaml

configMapGenerator:
  - name: monitoring-grafana-dashboard-nvidia-gpu
    namespace: monitoring
    files:
      - nvidia-gpu-kubernetes.json=nvidia-gpu-dashboard.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
