apiVersion: apps/v1
kind: Deployment
metadata:
  name: filip-cv
  namespace: cv
  labels:
    app: filip-cv
    app.kubernetes.io/name: filip-cv
    app.kubernetes.io/version: "REPLACED_BY_CI"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filip-cv
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: filip-cv
        version: "REPLACED_BY_CI"
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: default

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # ── Main container: nginx ─────────────────────────────────────���─────────
      containers:
        - name: cv
          image: ghcr.io/filipcsupka/filip-cv:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP

          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-logs
              mountPath: /var/log/nginx
            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: filip-cv

      terminationGracePeriodSeconds: 30
