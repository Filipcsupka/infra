apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filip-cv
  namespace: cv
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: cv.example.com  # TODO: replace with actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filip-cv
                port:
                  number: 80
  tls:
    - hosts:
        - cv.example.com
      secretName: filip-cv-tls
