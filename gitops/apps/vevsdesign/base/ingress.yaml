apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vevsdesign
  namespace: vevsdesign
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: vevsdesign.example.com  # TODO: replace with actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vevsdesign
                port:
                  number: 80
  tls:
    - hosts:
        - vevsdesign.example.com
      secretName: vevsdesign-tls   # managed by cert-manager or provided manually
