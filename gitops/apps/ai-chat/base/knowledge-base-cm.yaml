  infrastructure.md: "# How This AI Chatbot Works — Infrastructure Deep Dive\n\nThis document explains the technical setup\
    \ behind the AI chat you're using right now. Filip built it to learn the stack and flex a bit. Everything runs on his\
    \ own hardware and infrastructure.\n\n## Architecture overview\n\n```\nYou (browser on filipcsupka.online)\n  │\n  │ \
    \ HTTPS request to ai.filipcsupka.online/chat\n  ▼\nCloudflare CDN/proxy\n  │\n  ▼\nHetzner VPS — 178.104.235.97\n  k3s\
    \ control plane node (\"family-webapp\")\n  Traefik ingress controller (hostPort 80/443)\n  │\n  │  Routes to rag-api\
    \ Service via k8s cluster DNS\n  │  (cross-node traffic via Tailscale flannel)\n  ▼\nHome PC — GPU node (\"k3sgpu\") —\
    \ Tailscale IP 100.86.152.16\n  Ubuntu 26.04 LTS, 30GB RAM, NVIDIA GeForce RTX 2070 (8GB VRAM, CUDA 7.5)\n  ┌─────────────────────────────────────────────────────┐\n\
    \  │  k3s GPU worker node                                │\n  │                                                     │\n\
    \  │  [rag-api pod]          [chromadb pod]              │\n  │    FastAPI service        Vector database           │\n\
    \  │    RAG pipeline           ChromaDB                 │\n  │    ↕ HTTP                 ↕ HTTP                   │\n\
    \  │                                                     │\n  │  [Ollama — host process, systemd service]           │\n\
    \  │    LLM inference engine                             │\n  │    Models: qwen3:8b, deepseek-coder, mistral        │\n\
    \  │    GPU: RTX 2070 (CUDA, full VRAM utilization)     │\n  └─────────────────────────────────────────────────────┘\n\
    ```\n\n## What happens when you send a message\n\n1. **You type a question** in the chat widget on filipcsupka.online\n\
    2. **Your browser** sends a POST request to `https://ai.filipcsupka.online/chat` (JavaScript fetch)\n3. **Cloudflare**\
    \ proxies the request to the Hetzner VPS (178.104.235.97)\n4. **Traefik** (ingress controller on k3s) receives the HTTPS\
    \ request, terminates TLS, routes to the `rag-api` Kubernetes Service\n5. **Cross-node routing**: the request travels\
    \ from Hetzner to the home GPU node via Tailscale VPN (flannel overlay network)\n6. **RAG API** (FastAPI, Python) receives\
    \ the request and runs the RAG pipeline:\n   a. **Embeds your query**: calls Ollama's embedding endpoint with `nomic-embed-text`\
    \ model → gets a vector (numerical representation of your question)\n   b. **Semantic search**: queries ChromaDB with\
    \ that vector → retrieves the 3-5 most relevant knowledge chunks from the knowledge base\n   c. **Builds context prompt**:\
    \ assembles a prompt with the retrieved chunks + your question + system instructions\n   d. **LLM generation**: calls\
    \ Ollama with `qwen3:8b` model → the model generates a response using the context\n7. **Response** travels back through\
    \ the same path to your browser\n8. **Chat widget** displays the answer\n\n## Components\n\n### Ollama (LLM inference\
    \ runtime)\n- Runs as a systemd service on the GPU node host\n- Manages GPU memory, model loading/unloading\n- Exposes\
    \ OpenAI-compatible REST API on port 11434\n- Configured with `OLLAMA_HOST=0.0.0.0` (accessible from k8s pods)\n\n###\
    \ qwen3:8b (chat model)\n- 8 billion parameter Qwen 3 model from Alibaba\n- 5.2GB on disk, runs fully in VRAM (RTX 2070\
    \ has 8GB)\n- Handles: question answering, context understanding, natural language generation\n- Supports both English\
    \ and Slovak\n\n### nomic-embed-text (embedding model)\n- Lightweight embedding model (~274MB)\n- Converts text into 768-dimensional\
    \ vectors\n- Used for: embedding the knowledge base chunks and embedding your queries\n\n### ChromaDB (vector database)\n\
    - Open-source embedding database\n- Stores embedded knowledge chunks with metadata\n- Similarity search: finds chunks\
    \ most relevant to your query\n- Runs as a k8s pod on the GPU node, data persisted via PVC\n\n### RAG API (FastAPI)\n\
    - Python service implementing the Retrieval-Augmented Generation pipeline\n- On startup: loads knowledge base markdown\
    \ files, chunks them, embeds each chunk, stores in ChromaDB\n- On each chat request: embed query → retrieve → generate\
    \ → respond\n- Exposes POST /chat endpoint with CORS for filipcsupka.online\n- Runs as a k8s pod on the GPU node\n\n###\
    \ k3s cluster\n- Lightweight Kubernetes distribution\n- Control plane on Hetzner VPS (public cloud, stable, always-on)\n\
    - GPU worker node on home gaming PC (connected via Tailscale)\n- GitOps: all deployments managed by ArgoCD from GitHub\n\
    \n### Traefik ingress\n- Receives traffic on hostPort 80/443 on the Hetzner VPS\n- TLS terminated with Let's Encrypt certificates\
    \ (via cert-manager)\n- Routes `ai.filipcsupka.online` to the RAG API service\n\n### Tailscale VPN\n- Creates a private\
    \ encrypted mesh network between nodes\n- Hetzner node and home GPU node are on the same Tailscale tailnet\n- k3s uses\
    \ Tailscale interface (tailscale0) as the flannel backend for pod networking\n- The GPU node has no public IP — it's only\
    \ reachable via Tailscale\n\n## GPU details\n\n- NVIDIA GeForce RTX 2070 (consumer gaming GPU)\n- 8192 MiB VRAM (8GB)\n\
    - CUDA compute capability 7.5\n- Driver: 595.71.05\n- Used for: LLM inference (Ollama runs models on GPU, massive speedup\
    \ over CPU)\n- GPU scheduling in k3s: nvidia-device-plugin allocates `nvidia.com/gpu: 1` resource\n\n## Why home GPU vs\
    \ cloud GPU\n\nCloud GPU (e.g. AWS p3, GCP A100): $2-10/hour, no upfront cost, disposable\nHome RTX 2070: already owned\
    \ (gaming PC), runs 24/7 for ~$20/month electricity\nFor a personal project with low traffic: home GPU wins on cost and\
    \ is more fun to operate.\n\n## Knowledge base (RAG source)\n\nThe chatbot knows about Filip because of markdown files\
    \ stored in the `ai-chat` GitHub repository. When the RAG API starts, it reads these files, splits them into chunks (~500\
    \ tokens each), embeds each chunk with `nomic-embed-text`, and stores everything in ChromaDB.\n\nFiles:\n- `profile.md`\
    \ — who Filip is, contact, summary\n- `experience.md` — work history\n- `skills.md` — technical skills by layer\n- `projects.md`\
    \ — side projects including this chatbot\n- `personal.md` — weekends, MTB, family, personality\n- `infrastructure.md`\
    \ — this file (how the chatbot works)\n\nTo update what the chatbot knows: edit a markdown file → push to GitHub → GitHub\
    \ Actions rebuilds the Docker image → ArgoCD syncs → new pod starts with fresh knowledge.\n"
  personal.md: '# Filip Csupka — Personal / About


    ## Weekends and free time


    Filip is a hybrid athlete who enjoys many sports. His main hobby is **mountain biking (MTB)** — you can often find him
    on trails around Košice on weekends. He describes himself as an "every-sport enjoyer, master of none, happily over-scheduled
    by choice." He rides with enthusiasm, not necessarily with grace.


    Beyond MTB, he enjoys a wide range of physical activities and tries to stay active whenever time allows.


    ## Family


    Free time belongs to his kid first. The cluster can wait — childhood does not have retry logic. He has a partner (wife,
    who runs a graphic design studio at vevsdesign.sk) and manages the balance between a busy tech career and family life.


    ## Work style


    Since AI tools became seriously capable, Filip became what he calls a "workaholic who occasionally thinks he can do everything
    alone — then production politely disagrees." He has a genuine love for automation, documentation, and building things
    that work predictably.


    ## Values and approach


    - Maps the unknown, tests it, documents it, automates it

    - Turns vague production pain into dashboards, runbooks, and pipelines

    - Sits between dev, ops, and management without losing the YAML

    - Repeatable automation over heroic typing

    - Clusters supervised by reality, no matter how loud the AI


    ## Personality quirks


    - If you find a typo in the repo, it is probably already labeled with his name

    - He runs his wife''s design studio website on a Kubernetes cluster "because a simple VPS would be suspiciously reasonable"

    - His CV is deployed via GitOps — a DevOps engineer eating his own cooking


    ## Location and lifestyle


    Based in Košice, Slovakia. Open to remote work globally or relocation for the right opportunity.

    '
  profile.md: '# Filip Csupka — Profile


    ## Who is Filip?


    Filip Csupka is a DevOps / SRE / Platform Engineer based in Košice, Slovakia. He specialises in Kubernetes, OpenShift,
    GitOps delivery, and observability. His philosophy: platforms should be boring in production, fast for developers, and
    documented well enough that future-Filip does not need a detective board.


    He describes himself as a "Universal Soldier" — comfortable at every layer of the stack from bare-metal Linux to ArgoCD
    sync waves, from iptables rules to Kafka consumer lag dashboards.


    ## Contact


    - Location: Košice, Slovakia

    - Email: devopssro@gmail.com

    - Mobile: +421 919 235 462

    - GitHub: github.com/Filipcsupka

    - LinkedIn: linkedin.com/in/filip-csupka-21a26713a

    - Status: Open to remote work or relocation


    ## Summary


    DevOps / SRE engineer focused on Kubernetes, OpenShift, GitOps and observability. Comfortable sitting between dev, ops,
    and management without losing the YAML. Turns vague production pain into dashboards, runbooks, and pipelines. Repeatable
    automation over heroic typing.


    ## Languages


    - Slovak: native

    - English: professional (C1)

    - Czech: comfortably understood


    ## Current role appetite


    Open to remote or relocation roles involving:

    - Platform engineering / SRE

    - Kubernetes / OpenShift operations at scale

    - GitOps-driven delivery pipelines

    - Observability stack ownership

    - AI infrastructure (this very chatbot is proof)

