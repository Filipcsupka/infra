  projects.md: '# Filip Csupka — Side Projects


    ## vevsdesign.sk — wife''s design studio


    A website for his wife''s graphic design studio. Hosted on the same Hetzner Kubernetes cluster as his CV, deployed through
    the same ArgoCD GitOps pipeline. Same pipeline, different namespace. Because a simple VPS would be suspiciously reasonable.


    URL: https://vevsdesign.sk

    Stack: Next.js, Docker, k3s, ArgoCD, Cloudflare, Traefik, cert-manager, Let''s Encrypt


    ---


    ## filip-cv — this very website (filipcsupka.online)


    The CV website you''re currently visiting. Built as a Next.js static export, served by nginx, deployed via GitOps/ArgoCD
    to a Hetzner k3s cluster.


    URL: https://filipcsupka.online

    GitHub: https://github.com/Filipcsupka/cv-web

    Stack: Next.js 15, React 19, TypeScript, Tailwind v4, nginx, Docker, Kubernetes, Cloudflare


    ---


    ## Home lab cluster — personal Kubernetes platform


    A production-style Kubernetes cluster running on Hetzner Cloud (control plane + public workloads) with a home GPU worker
    node (NVIDIA RTX 2070) connected via Tailscale VPN. Not a toy — it runs real websites, GitOps delivery, monitoring, and
    now AI inference.


    Infrastructure:

    - Hetzner VPS (cx22, nbg1): k3s control plane + worker for public apps

    - Home gaming PC: k3s GPU worker, Ubuntu 26.04, 30GB RAM, RTX 2070 (8GB VRAM)

    - Tailscale: private VPN mesh connecting home GPU node to Hetzner node

    - Terraform: provisions Hetzner resources (one `terraform apply` from zero to cluster)

    - Ansible: configures k3s, Traefik, cert-manager, GPU worker join

    - ArgoCD: GitOps delivery, auto-sync from GitHub

    - Traefik: ingress controller with Let''s Encrypt TLS via cert-manager

    - Prometheus + Grafana: monitoring


    ---


    ## AI Chat (this chatbot) — self-hosted RAG on home GPU


    The chatbot you''re talking to right now. It runs entirely on Filip''s home gaming PC, not on any cloud AI service. No
    OpenAI API calls, no monthly subscription, fully under control.


    Technical details:

    - Ollama: LLM inference runtime on the GPU node (RTX 2070, 8GB VRAM, CUDA 7.5)

    - Model: qwen3:8b (5.2GB, runs fully on GPU)

    - Embeddings: nomic-embed-text via Ollama (for semantic search)

    - ChromaDB: vector database storing embedded knowledge chunks

    - RAG API: Python FastAPI service that handles: embed query → retrieve context → generate answer

    - Knowledge base: markdown files about Filip (this very file system)

    - Deployment: k8s pod on GPU node, managed by ArgoCD, connected to cv-web via Traefik ingress at ai.filipcsupka.online

    - The CV website (static nginx) calls the RAG API directly from the browser


    Why: to learn the full AI inference stack — model serving, RAG pipelines, vector databases, GPU scheduling in Kubernetes
    — and to flex a bit.

    '
  skills.md: '# Filip Csupka — Technical Skills


    ## Stack overview (bottom-up, as Filip sees it)


    Filip thinks about the platform stack in layers, each one standing on the ones below it:


    ### L0 — Linux / Network / Security (foundation)

    Shell, networking, syscalls, firewalls, troubleshooting.

    Tools: systemd, iptables, tcpdump, strace, bash, ssh.

    "Ground truth — every layer above is just YAML over this."


    ### L1 — Compute / Cloud / VM

    Hetzner Cloud, AKS (Azure Kubernetes Service), AWS, HUB/SPOKE private cloud, bare metal.

    "Physical and virtual nodes joined into one fleet."


    ### L2 — Docker / Containers

    OCI images, registries, container runtimes (containerd, CRI), GHCR.

    "Ship the same artefact from laptop to production."


    ### L3 — Kubernetes / OpenShift (core expertise)

    Schedulers, operators, lifecycle management, multi-tenant clusters, k3s, AKS.

    "Self-healing workloads, declared not clicked."


    ### L4 — Helm / Packaging

    Helm charts, Kustomize overlays, operators, sealed secrets, OLM.

    "Version-pinned, reviewable, repeatable installs."


    ### L5 — IaC / Terraform

    Terraform modules, state management, Ansible playbooks, idempotent provisioning.

    "Infrastructure as a pull request."


    ### L6 — CI/CD Pipelines

    GitHub Actions, GitLab CI, runners, build→test→image→push→tag pipelines.

    "Every commit rides the same pipe."


    ### L7 — GitOps / ArgoCD (strong)

    ArgoCD, App-of-Apps pattern, sync waves, drift detection, auto-sync.

    "The cluster reconciles itself toward main."


    ### L8 — Data Services

    Kafka, PostgreSQL, MongoDB, Kafka Connect.

    "Events flow through services, debugged across teams."


    ### L9 — Observability

    Prometheus, Grafana, Loki, Tempo, Grafana Alloy, distributed tracing, alerting.

    "Answers before incidents grow up."


    ### L10 — AI / DevEx (growing fast)

    Claude Code, Codex, MCP, agent skills. Self-hosted LLM inference. This chatbot.

    "Supervised by reality, no matter how loud the AI."


    ---


    ## Skill levels (approximate)


    - Orchestration (k8s/OpenShift/Helm/Docker): 92%

    - GitOps & automation (ArgoCD/CI-CD/Terraform): 88%

    - Observability (Prometheus/Grafana/Loki/Tempo): 84%

    - Data & messaging (Kafka/PostgreSQL/MongoDB): 74%


    ---


    ## Certifications / knowledge areas


    - OpenShift operations and upgrades (professional experience)

    - AWS Solutions Architect Associate level knowledge

    - Kubernetes CKA-level operational depth (from production, not just study)

