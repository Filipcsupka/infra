  experience.md: '# Filip Csupka — Work Experience


    ## Private-cloud OpenShift operations


    **Focus:** HUB/SPOKE clusters, upgrades, operators, production reliability


    Kept regulated OpenShift platforms healthy while planning upgrades with zero drama. This was not simple click-ops — it
    was custom Helm charts for core infrastructure operators, GitLab CI/CD delivery pipelines, and carefully validated upgrade
    paths tested in a dedicated lab topology before touching anything live.


    **Key highlights:**

    - Operate HUB/SPOKE private-cloud clusters — monitoring, configuration drift detection, incident response

    - Manage cluster core infrastructure and operators via custom Helm charts

    - Plan and validate OpenShift + operator lifecycle upgrades before production

    - Maintain GitLab CI/CD delivery patterns and runner tag routing

    - Built a lab topology to prove upgrade paths and rollback plans before live clusters


    **Tags:** OpenShift, Red Hat, HUB/SPOKE, Operators, GitOps, GitLab CI/CD, Helm, Runbooks


    ---


    ## Healthcare platform engineering


    **Focus:** AKS, Hetzner, multi-tenant Kubernetes, GitOps delivery


    Built and operated clusters for hospital software where every namespace wants privacy, uptime, and a little emotional
    support. Scaled a multi-tenant cluster to thousands of pods.


    **Key highlights:**

    - Operate multiple AKS clusters and a large Hetzner Kubernetes platform across dev, test, prod, and customer-dedicated
    environments

    - Own GitOps delivery end-to-end: container build → ArgoCD sync, using Kustomize, Helm, and sealed secrets

    - Scaled multi-tenant cluster to thousands of pods with namespace isolation, quotas, and full observability

    - Debug service connectivity, PostgreSQL, MongoDB, Kafka flows and distributed traces across teams


    **Tags:** AKS, Hetzner, ArgoCD, GitLab CI, Kustomize, Helm, Kafka, PostgreSQL, MongoDB, Loki, Tempo


    ---


    ## Cloud infrastructure foundations


    **Focus:** AWS fundamentals, infrastructure thinking, delivery discipline


    Worked on AWS-oriented infrastructure topics. Strengthened habits around repeatability, recovery, and operational ownership.
    Most outages are just undocumented assumptions wearing a hoodie.


    **Tags:** AWS, Cloud Architecture, Operations, Reliability


    ---


    ## Technical leadership and migrations


    **Focus:** Team leadership, groupware migrations, customer coordination


    Led admins, migrations, and vendor conversations. Translated business urgency into technical work without losing the plot.
    Kept customers, vendors, and internal teams aligned when timelines were optimistic and reality had comments.


    **Tags:** Leadership, Migration, Exchange, Teams, Documentation


    ---


    ## Enterprise operations (earlier career)


    **Focus:** Service quality, people coordination, operational discipline


    The earlier ops years: people, process, uptime, and the discovery that clear communication fixes more tickets than heroic
    typing. Built the practical foundation for later SRE work — measure, communicate, automate, repeat.


    **Tags:** Operations, Service Management, Leadership, Customer Support

