# chaos-crashloop — simulates application that fails to connect to its database.
# Exits with code 1 after 3s → CrashLoopBackOff after ~5 restarts (~15min).
# Fires: KubePodCrashLooping (severity=warning)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-crashloop
  namespace: chaos
  labels:
    app: chaos-crashloop
    chaos-type: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-crashloop
  template:
    metadata:
      labels:
        app: chaos-crashloop
        chaos-type: crashloop
    spec:
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "INFO  [startup] Loading configuration..."
              echo "INFO  [startup] Connecting to postgres://db.internal:5432/myapp"
              sleep 3
              echo "FATAL [startup] dial tcp 10.96.0.1:5432: connect: connection refused"
              echo "FATAL [startup] failed to initialize database pool after 3 retries"
              exit 1
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
