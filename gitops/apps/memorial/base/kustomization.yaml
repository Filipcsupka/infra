apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - config.yaml
  - postgres.yaml
  - minio.yaml
  - mailhog.yaml
  - api.yaml
  - web.yaml
  - ingress.yaml
  - cronjobs.yaml

configMapGenerator:
  - name: memorial-db-init
    namespace: memorial
    files:
      - db/01-init.sql
      - db/02-notification-log.sql
    options:
      disableNameSuffixHash: true
