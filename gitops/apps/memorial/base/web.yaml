apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorial-web
  namespace: memorial
  labels:
    app: memorial-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: memorial-web
  template:
    metadata:
      labels:
        app: memorial-web
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-01
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: web
          image: ghcr.io/filipcsupka/memorial-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # /api/* rewrite proxy (read at runtime by next.config) → internal api.
            - name: NEXT_PUBLIC_API_URL
              value: http://memorial-api:3001
            # Server-component fetches (admin/gallery/status). MUST be a non-public
            # var: NEXT_PUBLIC_* is inlined at image build to the localhost build-arg
            # and cannot be overridden at runtime inside the pod (→ ECONNREFUSED).
            - name: API_INTERNAL_URL
              value: http://memorial-api:3001
            # Public web origin shown in /admin (NFC + upload links).
            - name: WEB_PUBLIC_URL
              value: https://memorial.filipcsupka.online
            # Admin portal: internal web->api service credential (x-admin-token
            # header) + HMAC key that signs admin_session cookies.
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: memorial-secrets
                  key: ADMIN_TOKEN
            # Admin login (username/password). Must exist in memorial-secrets or
            # /admin/login can never succeed (admin lockout).
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: memorial-secrets
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: memorial-secrets
                  key: ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
      volumes:
        - name: next-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: memorial-web
  namespace: memorial
spec:
  selector:
    app: memorial-web
  ports:
    - port: 3000
      targetPort: 3000
