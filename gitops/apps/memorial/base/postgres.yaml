apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: memorial
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: memorial
  labels:
    app: postgres
spec:
  replicas: 1
  # RWO PVC on a single node — never run two postgres pods at once
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-01
      securityContext:
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: memorial
            - name: POSTGRES_DB
              value: memorial
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: memorial-secrets
                  key: POSTGRES_PASSWORD
            # subdir keeps initdb happy if the volume root ever gains foreign files
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: db-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "memorial", "-d", "memorial"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "memorial", "-d", "memorial"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: db-init
          configMap:
            name: memorial-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: memorial
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
