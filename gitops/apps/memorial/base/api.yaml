apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorial-api
  namespace: memorial
  labels:
    app: memorial-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: memorial-api
  template:
    metadata:
      labels:
        app: memorial-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-01
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/filipcsupka/memorial-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: memorial-config
            - secretRef:
                name: memorial-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # multer temp files + legacy UPLOAD_DIR fallback
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: memorial-api
  namespace: memorial
spec:
  selector:
    app: memorial-api
  ports:
    - port: 3001
      targetPort: 3001
