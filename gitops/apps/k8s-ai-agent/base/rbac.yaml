# Phase 1+3: read-only cluster-wide access + narrow write ops for /apply endpoint.
# Write verbs are limited to pods (delete for restart) and apps workloads (patch for scale/memory).
# PVCs, secrets, nodes are intentionally excluded — see apply.py BLACKLISTED_RESOURCES.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-agent-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - nodes
      - namespaces
      - services
      - endpoints
      - configmaps
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources:
      - pods
    verbs: [delete]
  - apiGroups: [apps]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources:
      - deployments
      - statefulsets
    verbs: [patch, update]
  - apiGroups: [metrics.k8s.io]
    resources:
      - pods
      - nodes
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-agent-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-agent-reader
subjects:
  - kind: ServiceAccount
    name: k8s-ai-agent
    namespace: ai-agent
