# ─── Cloudflare Tunnel (cloudflared) ──────────────────────────────────────────
#
# This replaces a traditional Ingress + cert-manager setup.
# Cloudflare handles TLS termination — the pod communicates over HTTP.
#
# Prerequisites:
#   1. Create a tunnel:  cloudflared tunnel create filip-cv
#   2. Create a secret:  kubectl -n cv create secret generic cloudflare-tunnel \
#                          --from-file=credentials.json=~/.cloudflared/<TUNNEL_ID>.json
#   3. Update TUNNEL_ID below with your tunnel UUID
#
# The tunnel will receive a *.trycloudflare.com URL (or your custom domain).
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cv
data:
  config.yaml: |
    tunnel: <TUNNEL_ID>                 # Replace with your tunnel UUID
    credentials-file: /etc/cloudflared/credentials.json

    ingress:
      - service: http://filip-cv.cv.svc.cluster.local:80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cv
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: credentials
          secret:
            secretName: cloudflare-tunnel
